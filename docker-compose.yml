# Run this as its own stack on the Hetzner server (e.g. docker compose -p server-config up -d).
#
# One-time setup on the server (before first `up`):
#   docker network create caddy-net
#
# Site containers (steffan-lol, etc.) join the same network via
# `networks: { caddy-net: { external: true } }` in their own compose files.
# The network is external here too so no single stack owns it — any stack
# can restart or be recreated without tearing the network down.

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - caddy-net

networks:
  caddy-net:
    external: true

volumes:
  caddy_data:
  caddy_config:
